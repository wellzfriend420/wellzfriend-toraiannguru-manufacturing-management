<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>製造管理</title><link rel="stylesheet" href="/style.css"><link rel="stylesheet" href="/navigation.css"><link rel="stylesheet" href="/responsive.css"></head><body>
<div id="app">
<aside id="drawer" class="drawer" aria-hidden="true"><div class="drawer-brand"><strong>とらいアンぐる</strong><small>製造管理システム</small></div><div class="drawer-label">表示</div><button class="drawer-item active" data-view="dashboard">ダッシュボード</button><div id="adminMenu"><div class="drawer-label">管理入力</div><button class="drawer-item" data-view="process-input">工程実績入力</button><button class="drawer-item" data-view="time-exception">時間例外入力</button><button class="drawer-item" data-view="other-inputs">その他の入力</button><div class="drawer-label">LINE・えんちゃん</div><button class="drawer-item" data-view="line-users">LINE利用者管理</button><button class="drawer-item" data-view="work-history">作業履歴・訂正</button><button class="drawer-item" data-view="company-settings">会社設定</button></div></aside><button id="drawerBackdrop" class="drawer-backdrop" aria-label="メニューを閉じる" hidden></button>
<header><button id="menuToggle" class="menu-toggle" aria-label="メニューを開く" aria-expanded="false">☰</button><div><p class="eyebrow">製造管理システム</p><h1 id="pageTitle">ダッシュボード</h1></div></header>
<main id="dashboardView" class="app-view"><nav><button data-dept="lotus" class="active">れんこん</button><button data-dept="produce">青果</button><span class="spacer"></span><button data-period="day" class="active">日次</button><button data-period="week">週次</button><button data-period="month">月次</button><input id="anchor" type="date" aria-label="対象日"></nav>
<section id="status" class="status"></section><section id="dashboard"></section>
<section id="details" class="details"><button data-detail="process">工程分析</button><button data-detail="workforce">人員・個人実績</button><button data-detail="profit">商品別採算</button></section><section id="detailPanel" class="panel" hidden></section></main>
<main id="processInputView" class="app-view input-view" hidden><form id="processForm" class="panel mobile-form"><h2>工程実績入力</h2><p class="form-help">帳票と同じ順番で、1人・1作業ずつ登録します。</p><label>部門<select name="department_id" id="inputDepartment" required></select></label><label>作業日<input name="work_date" type="date" required></label><label id="inputProductLabel" hidden>商品<select name="product_id" id="inputProduct"></select></label><label>使用材料（入荷日・加工日）<select name="input_lot_id" id="inputLot" required></select></label><label>使用量（g）<input name="input_qty_g" type="number" inputmode="numeric" min="0" required></label><label>破棄（g）<input name="waste_qty_g" type="number" inputmode="numeric" min="0" value="0" required></label><label>出来高（g）<input name="output_qty_g" type="number" inputmode="numeric" min="0" required></label><label>担当者<select name="employee_id" id="inputEmployee" required></select></label><label>工程<select name="process_id" id="inputProcess" required></select></label><label>備考<textarea name="memo" rows="3"></textarea></label><button class="submit-button">工程実績を登録</button><p id="processMessage" class="form-message" aria-live="polite"></p></form></main>
<main id="timeExceptionView" class="app-view input-view" hidden><form id="timeExceptionForm" class="panel mobile-form"><h2>時間例外入力</h2><p class="form-help">LINE連携前または取得できなかった場合だけ使用します。</p><label>作業日<input name="work_date" type="date" required></label><label>部門<select name="department_id" id="timeDepartment" required></select></label><label>担当者<select name="employee_id" id="timeEmployee" required></select></label><label>工程<select name="process_id" id="timeProcess" required></select></label><label>開始日時<input name="started_at" type="datetime-local" required></label><label>終了日時<input name="ended_at" type="datetime-local" required></label><label>休憩時間（分）<input name="break_minutes" type="number" inputmode="numeric" min="0" value="0" required></label><label>例外入力理由<textarea name="exception_reason" rows="3" required></textarea></label><button class="submit-button">作業時間を登録</button><p id="timeMessage" class="form-message" aria-live="polite"></p></form></main>
<main id="otherInputsView" class="app-view input-view" hidden><section class="panel"><h2>その他の入力</h2><p class="form-help">入力内容ごとに画面を分け、必要な画面だけを開く構成で順次実装します。</p><div class="input-menu"><button disabled>入荷入力</button><button disabled>個人別加工実績</button><button disabled>製造・完成入力</button><button disabled>在庫入力</button><button disabled>出荷・納品入力</button></div></section></main>
<main id="lineUsersView" class="app-view input-view wide-view" hidden><section class="panel"><h2>LINE利用者管理</h2><form id="registrationCodeForm" class="inline-form"><label>従業員<select name="employee_id" id="lineEmployee" required></select></label><label>有効時間（分）<input name="valid_minutes" type="number" min="5" value="60" required></label><button>登録コード発行</button></form><p id="registrationCodeResult" class="code-result"></p><div id="lineUsersList" class="management-cards"></div></section></main>
<main id="workHistoryView" class="app-view input-view wide-view" hidden><section class="panel"><h2>作業履歴・訂正</h2><form id="workHistoryFilter" class="filter-form"><label>作業日<input name="date" type="date"></label><label>担当者<select name="employee_id" id="historyEmployee"><option value="">全員</option></select></label><label>部門<select name="department_id" id="historyDepartment"><option value="">全部門</option></select></label><label>工程<select name="process_id" id="historyProcess"><option value="">全工程</option></select></label><button>検索</button></form><div id="workHistoryList" class="management-cards"></div></section></main>
<main id="companySettingsView" class="app-view input-view wide-view" hidden><section class="panel"><h2>会社設定</h2><form id="companySettingsForm" class="mobile-form"><label>標準終業時間<input name="standard_end_time" type="time" required></label><label>猶予時間（分）<input name="grace_minutes" type="number" min="0" required></label><label>休憩運用方式<select name="break_mode"><option value="none">休憩なし</option><option value="line">LINE打刻</option><option value="fixed">固定休憩自動控除</option><option value="admin">管理者修正</option></select></label><label class="check-label"><input name="line_enabled" type="checkbox">LINE利用</label><label class="check-label"><input name="unfinished_notification_enabled" type="checkbox">未終了通知</label><button>設定を保存</button></form><h3>固定休憩</h3><form id="fixedBreakForm" class="inline-form"><label>名称<input name="name" required></label><label>開始<input name="start_time" type="time" required></label><label>終了<input name="end_time" type="time" required></label><button>追加</button></form><div id="fixedBreakList" class="management-cards"></div><h3>LINEサブメニュー</h3><p class="form-help">表示名・並び順・使用状態を編集できます。</p><div id="lineMenuList" class="management-cards"></div></section></main>
</div><script type="module" src="/app.js"></script></body></html>
