<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>製造管理</title><link rel="stylesheet" href="/style.css"><link rel="stylesheet" href="/navigation.css"></head><body>
<div id="app">
<aside id="drawer" class="drawer" aria-hidden="true"><div class="drawer-brand"><strong>とらいアンぐる</strong><small>製造管理システム</small></div><div class="drawer-label">表示</div><button class="drawer-item active" data-view="dashboard">ダッシュボード</button><div id="adminMenu"><div class="drawer-label">管理入力</div><button class="drawer-item" data-view="process-input">工程実績入力</button><button class="drawer-item" data-view="other-inputs">その他の入力</button></div></aside><button id="drawerBackdrop" class="drawer-backdrop" aria-label="メニューを閉じる" hidden></button>
<header><button id="menuToggle" class="menu-toggle" aria-label="メニューを開く" aria-expanded="false">☰</button><div><p class="eyebrow">製造管理システム</p><h1 id="pageTitle">ダッシュボード</h1></div></header>
<main id="dashboardView" class="app-view"><nav><button data-dept="lotus" class="active">れんこん</button><button data-dept="produce">青果</button><span class="spacer"></span><button data-period="day" class="active">日次</button><button data-period="week">週次</button><button data-period="month">月次</button><input id="anchor" type="date" aria-label="対象日"></nav>
<section id="status" class="status"></section><section id="dashboard"></section>
<section id="details" class="details"><button data-detail="process">工程分析</button><button data-detail="workforce">人員・個人実績</button><button data-detail="profit">商品別採算</button></section><section id="detailPanel" class="panel" hidden></section></main>
<main id="processInputView" class="app-view input-view" hidden><form id="processForm" class="panel mobile-form"><h2>工程実績入力</h2><p class="form-help">1件ずつ必要項目を入力して登録します。</p><label>作業日<input name="work_date" type="date" required></label><label>部門<select name="department_id" id="inputDepartment" required></select></label><label>工程<select name="process_id" id="inputProcess" required></select></label><label>投入量（g）<input name="input_qty_g" type="number" inputmode="numeric" min="0" required></label><label>加工後量（g）<input name="output_qty_g" type="number" inputmode="numeric" min="0" required></label><label>廃棄量（g）<input name="waste_qty_g" type="number" inputmode="numeric" min="0" value="0" required></label><label>備考<textarea name="memo" rows="3"></textarea></label><button class="submit-button">工程実績を登録</button><p id="processMessage" class="form-message" aria-live="polite"></p></form></main>
<main id="otherInputsView" class="app-view input-view" hidden><section class="panel"><h2>その他の入力</h2><p class="form-help">入力内容ごとに画面を分け、必要な画面だけを開く構成で順次実装します。</p><div class="input-menu"><button disabled>入荷入力</button><button disabled>個人別加工実績</button><button disabled>製造・完成入力</button><button disabled>在庫入力</button><button disabled>出荷・納品入力</button></div></section></main>
</div><script type="module" src="/app.js"></script></body></html>
